# Build-script decisions for dependencies that ship postinstall scripts.
# Declining also stops pnpm v11 from failing every `pnpm <script>` with
# ERR_PNPM_IGNORED_BUILDS.
#   esbuild — vitest's bundler; its install script places the platform binary
#   sharp   — not needed: next.config.mjs sets images.unoptimized: true
allowBuilds:
  esbuild: true
  sharp: false
